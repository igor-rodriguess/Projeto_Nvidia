services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nvidia-ai-radar-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: nvidia-ai-radar-searxng
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      - SEARXNG_SECRET=${SEARXNG_SECRET:?SEARXNG_SECRET deve ser configurado no .env da raiz}
      - SEARXNG_LIMITER=false
    volumes:
      - ./infra/searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped

  api:
    profiles: ["backend"]
    build:
      context: ./backend
    container_name: nvidia-ai-radar-api
    env_file:
      - ./backend/.env
    environment:
      QDRANT_URL: http://qdrant:6333
      SEARXNG_BASE_URL: http://searxng:8080
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - searxng
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    profiles: ["backend"]
    build:
      context: ./backend
    container_name: nvidia-ai-radar-worker
    env_file:
      - ./backend/.env
    environment:
      QDRANT_URL: http://qdrant:6333
      SEARXNG_BASE_URL: http://searxng:8080
    command: ["python", "scripts/run_batch_worker.py", "--poll-seconds", "5"]
    depends_on:
      - qdrant
      - searxng
    volumes:
      - backend_cache:/app/data/cache
    restart: unless-stopped

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v3.7.3
    container_name: nvidia-ai-radar-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./infra/secrets/metrics_token:/run/secrets/metrics_token:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  qdrant_data:
  backend_cache:
