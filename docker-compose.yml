services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nvidia-ai-radar-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: nvidia-ai-radar-searxng
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      - SEARXNG_SECRET=${SEARXNG_SECRET:?SEARXNG_SECRET deve ser configurado no .env da raiz}
      - SEARXNG_LIMITER=false
    volumes:
      - ./infra/searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped

volumes:
  qdrant_data:
