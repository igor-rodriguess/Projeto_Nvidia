[tool.ruff]
target-version = "py313"
line-length = 100
exclude = ["data"]

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82"]

[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true
follow_imports = "skip"
incremental = false
check_untyped_defs = true
warn_unused_ignores = true
show_error_codes = true
files = [
  "app",
  "scripts",
]
