global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: nvidia-startup-ai-radar
    metrics_path: /metrics
    static_configs:
      - targets: [api:8000]
    authorization:
      type: Bearer
      credentials_file: /run/secrets/metrics_token
