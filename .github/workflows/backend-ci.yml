name: Backend CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Testes e qualidade
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Instalar dependencias
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt
      - name: Verificar erros estaticos
        run: python -m ruff check app tests scripts
      - name: Verificar contratos tipados
        run: python -m mypy
      - name: Executar testes
        run: pytest -q

  secret-scan:
    name: Scan de segredos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Executar Gitleaks no historico
        run: >-
          docker run --rm
          -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:v8.30.0
          detect --source=/repo --no-banner --redact

  container-build:
    name: Build da imagem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Construir backend sem segredos
        run: docker build --tag nvidia-startup-ai-radar:${{ github.sha }} backend

  docker-smoke:
    name: Smoke Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Preparar ambiente efemero
        run: |
          printf 'SEARXNG_SECRET=%s\n' 'ci-secret-with-at-least-32-characters' > .env
          cat > backend/.env <<'EOF'
          SUPABASE_URL=https://example.invalid
          SUPABASE_SECRET_KEY=ci-placeholder
          BACKEND_API_KEY=ci-api-key
          ENVIRONMENT=development
          ALLOW_LEGACY_API_KEY=true
          EOF
      - name: Subir dependencias e API
        run: docker compose --profile backend up -d --build qdrant searxng api
      - name: Aguardar API
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://localhost:8000/health; then exit 0; fi
            sleep 2
          done
          docker compose logs api qdrant searxng
          exit 1
      - name: Validar imagem do worker
        run: docker compose --profile backend run --rm worker python scripts/run_batch_worker.py --smoke
      - name: Coletar logs em falha
        if: failure()
        run: docker compose logs api worker qdrant searxng
      - name: Encerrar ambiente
        if: always()
        run: docker compose --profile backend down --volumes --remove-orphans

  publish-image:
    name: Publicar imagem imutavel
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [quality, secret-scan, container-build, docker-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Autenticar no GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Construir e publicar
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/nvidia-startup-ai-radar
        run: |
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          docker build --tag "$IMAGE:${{ github.sha }}" --tag "$IMAGE:latest" backend
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
