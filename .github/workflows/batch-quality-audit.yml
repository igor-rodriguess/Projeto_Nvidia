name: Batch Quality Audit

on:
  workflow_dispatch:
    inputs:
      batch_id:
        description: UUID do lote persistido no Supabase
        required: true
        type: string

permissions:
  contents: read

jobs:
  audit:
    name: Auditar lote real
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Instalar dependencias
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt
      - name: Executar auditoria automatica
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python scripts/audit_batch_quality.py "${{ inputs.batch_id }}" --output-dir quality-report
      - name: Publicar relatorio
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: batch-quality-${{ inputs.batch_id }}
          path: backend/quality-report
          if-no-files-found: error
